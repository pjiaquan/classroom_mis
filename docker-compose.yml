services:
  postgres:
    image: postgres:16
    container_name: classroom-mis-postgres
    restart: unless-stopped
    environment:
      APP_SCHEMA: ${APP_SCHEMA:?APP_SCHEMA is required. Copy .env.example to .env and set APP_SCHEMA.}
      APP_POSTGRES_DB: ${APP_POSTGRES_DB:?APP_POSTGRES_DB is required. Copy .env.example to .env and set APP_POSTGRES_DB.}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required. Copy .env.example to .env and set POSTGRES_DB.}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required. Copy .env.example to .env and set POSTGRES_HOST.}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required. Copy .env.example to .env and set POSTGRES_USER.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env and set POSTGRES_PASSWORD.}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required. Copy .env.example to .env and set POSTGRES_PORT.}
      TZ: ${TZ:?TZ is required. Copy .env.example to .env and set TZ.}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required.} -d ${POSTGRES_DB:?POSTGRES_DB is required.}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: classroom-mis-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required. Copy .env.example to .env and set REDIS_PASSWORD.}"]
    volumes:
      - ./data/redis:/data
    networks:
      - backend

  migrate:
    image: ghcr.io/amacneil/dbmate:latest
    container_name: classroom-mis-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER is required.}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required.}@${POSTGRES_HOST:?POSTGRES_HOST is required.}:${POSTGRES_PORT:?POSTGRES_PORT is required.}/${APP_POSTGRES_DB:?APP_POSTGRES_DB is required.}?sslmode=disable&options=-csearch_path%3Dpublic
    command: ["--wait", "--wait-timeout", "120s", "--migrations-dir", "/db/migrations", "--no-dump-schema", "up"]
    volumes:
      - ./db:/db:ro
    restart: "no"
    networks:
      - backend

  mathesar-db-setup:
    image: postgres:16
    container_name: classroom-mis-mathesar-db-setup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env and set POSTGRES_PASSWORD.}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required. Copy .env.example to .env and set POSTGRES_DB.}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required. Copy .env.example to .env and set POSTGRES_HOST.}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required. Copy .env.example to .env and set POSTGRES_PORT.}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required. Copy .env.example to .env and set POSTGRES_USER.}
      MATHESAR_POSTGRES_DB: ${MATHESAR_POSTGRES_DB:-mathesar_django}
    command:
      - sh
      - -lc
      - |
        psql \
          --host "$$POSTGRES_HOST" \
          --port "$$POSTGRES_PORT" \
          --username "$$POSTGRES_USER" \
          --dbname "$$POSTGRES_DB" \
          --set mathesar_db="$$MATHESAR_POSTGRES_DB" \
          --set postgres_user="$$POSTGRES_USER" \
          <<'SQL'
        SELECT format('CREATE DATABASE %I OWNER %I', :'mathesar_db', :'postgres_user')
        WHERE NOT EXISTS (
          SELECT 1
          FROM pg_database
          WHERE datname = :'mathesar_db'
        )\gexec
        SQL
    restart: "no"
    networks:
      - backend

  mathesar:
    image: mathesar/mathesar:latest
    container_name: classroom-mis-mathesar
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mathesar-db-setup:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      ALLOWED_HOSTS: ${MATHESAR_ALLOWED_HOSTS:-*}
      DEBUG: ${MATHESAR_DEBUG:-false}
      SECRET_KEY: ${MATHESAR_SECRET_KEY:-}
      WEB_CONCURRENCY: ${MATHESAR_WEB_CONCURRENCY:-3}
      POSTGRES_DB: ${MATHESAR_POSTGRES_DB:-mathesar_django}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required. Copy .env.example to .env and set POSTGRES_USER.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env and set POSTGRES_PASSWORD.}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required. Copy .env.example to .env and set POSTGRES_HOST.}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required. Copy .env.example to .env and set POSTGRES_PORT.}
      TZ: ${TZ:?TZ is required. Copy .env.example to .env and set TZ.}
    volumes:
      - ./data/mathesar/static:/code/static
      - ./data/mathesar/media:/code/.media
      - ./data/mathesar/secrets:/code/.secrets
    ports:
      - "8080:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - backend

  nocodb:
    image: nocodb/nocodb:latest
    container_name: classroom-mis-nocodb
    profiles: ["nocodb"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      NC_DB: pg://postgres:5432?u=${POSTGRES_USER:-}&p=${POSTGRES_PASSWORD:-}&d=${POSTGRES_DB:-}
      NC_REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      NC_AUTH_JWT_SECRET: ${NC_AUTH_JWT_SECRET:-}
      NC_PUBLIC_URL: ${NC_PUBLIC_URL:-}
      NC_ADMIN_EMAIL: ${NC_ADMIN_EMAIL:-}
      NC_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD:-}
      TZ: ${TZ:?TZ is required. Copy .env.example to .env and set TZ.}
    volumes:
      - ./data/nocodb:/usr/app/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null 2>&1 || wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    networks:
      - backend

  bootstrap:
    build:
      context: .
      dockerfile: bootstrap/Dockerfile
    container_name: classroom-mis-bootstrap
    profiles: ["nocodb"]
    depends_on:
      postgres:
        condition: service_healthy
      nocodb:
        condition: service_healthy
    environment:
      APP_SCHEMA: ${APP_SCHEMA:?APP_SCHEMA is required. Copy .env.example to .env and set APP_SCHEMA.}
      APP_POSTGRES_DB: ${APP_POSTGRES_DB:?APP_POSTGRES_DB is required. Copy .env.example to .env and set APP_POSTGRES_DB.}
      NC_ADMIN_EMAIL: ${NC_ADMIN_EMAIL:-}
      NC_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD:-}
      NOCODB_BASE_TITLE: ${NOCODB_BASE_TITLE:-}
      NOCODB_BASE_VERSION: ${NOCODB_BASE_VERSION:-}
      NOCODB_BOOTSTRAP_POLL_INTERVAL_SECONDS: ${NOCODB_BOOTSTRAP_POLL_INTERVAL_SECONDS:-}
      NOCODB_BOOTSTRAP_TIMEOUT_SECONDS: ${NOCODB_BOOTSTRAP_TIMEOUT_SECONDS:-}
      NOCODB_INTEGRATION_TITLE: ${NOCODB_INTEGRATION_TITLE:-}
      NOCODB_INTERNAL_URL: ${NOCODB_INTERNAL_URL:-}
      NOCODB_SOURCE_ALIAS: ${NOCODB_SOURCE_ALIAS:-}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required. Copy .env.example to .env and set POSTGRES_DB.}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required. Copy .env.example to .env and set POSTGRES_HOST.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env and set POSTGRES_PASSWORD.}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required. Copy .env.example to .env and set POSTGRES_PORT.}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required. Copy .env.example to .env and set POSTGRES_USER.}
      TZ: ${TZ:?TZ is required. Copy .env.example to .env and set TZ.}
    restart: "no"
    networks:
      - backend

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: classroom-mis-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_POSTGRES_DB: ${APP_POSTGRES_DB:?APP_POSTGRES_DB is required. Copy .env.example to .env and set APP_POSTGRES_DB.}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required. Copy .env.example to .env and set POSTGRES_USER.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env and set POSTGRES_PASSWORD.}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required. Copy .env.example to .env and set REDIS_PASSWORD.}
      NC_ADMIN_EMAIL: ${NC_ADMIN_EMAIL:?NC_ADMIN_EMAIL is required. Copy .env.example to .env and set NC_ADMIN_EMAIL.}
      NC_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD:?NC_ADMIN_PASSWORD is required. Copy .env.example to .env and set NC_ADMIN_PASSWORD.}
      WEB_ADMIN_USER: ${WEB_ADMIN_USER:-}
      WEB_ADMIN_PASSWORD: ${WEB_ADMIN_PASSWORD:-}
      WEB_UPLOAD_URL_SECRET: ${WEB_UPLOAD_URL_SECRET:-}
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: 6379
      APP_DB_HOST: postgres
      APP_DB_PORT: 5432
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      TZ: ${TZ:?TZ is required. Copy .env.example to .env and set TZ.}
    volumes:
      - ./data/form_uploads:/data/form_uploads
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend

networks:
  backend:
