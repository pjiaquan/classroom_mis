services:
  postgres:
    image: postgres:16
    container_name: classroom-mis-postgres
    restart: unless-stopped
    environment:
      APP_SCHEMA: ${APP_SCHEMA:?APP_SCHEMA is required. Copy .env.example to .env and set APP_SCHEMA.}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required. Copy .env.example to .env and set POSTGRES_DB.}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required. Copy .env.example to .env and set POSTGRES_HOST.}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required. Copy .env.example to .env and set POSTGRES_USER.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env and set POSTGRES_PASSWORD.}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required. Copy .env.example to .env and set POSTGRES_PORT.}
      TZ: ${TZ:?TZ is required. Copy .env.example to .env and set TZ.}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required.} -d ${POSTGRES_DB:?POSTGRES_DB is required.}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: classroom-mis-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required. Copy .env.example to .env and set REDIS_PASSWORD.}"]
    volumes:
      - ./data/redis:/data
    networks:
      - backend

  migrate:
    image: ghcr.io/amacneil/dbmate:latest
    container_name: classroom-mis-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required. Copy .env.example to .env and set DATABASE_URL.}
    command: ["--wait", "--wait-timeout", "120s", "--migrations-dir", "/db/migrations", "--no-dump-schema", "up"]
    volumes:
      - ./db:/db:ro
    restart: "no"
    networks:
      - backend

  nocodb:
    image: nocodb/nocodb:latest
    container_name: classroom-mis-nocodb
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      NC_DB: pg://postgres:5432?u=${POSTGRES_USER:?POSTGRES_USER is required.}&p=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required.}&d=${POSTGRES_DB:?POSTGRES_DB is required.}
      NC_REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required.}@redis:6379/0
      NC_AUTH_JWT_SECRET: ${NC_AUTH_JWT_SECRET:?NC_AUTH_JWT_SECRET is required. Copy .env.example to .env and set NC_AUTH_JWT_SECRET.}
      NC_PUBLIC_URL: ${NC_PUBLIC_URL:?NC_PUBLIC_URL is required. Copy .env.example to .env and set NC_PUBLIC_URL.}
      NC_ADMIN_EMAIL: ${NC_ADMIN_EMAIL:?NC_ADMIN_EMAIL is required. Copy .env.example to .env and set NC_ADMIN_EMAIL.}
      NC_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD:?NC_ADMIN_PASSWORD is required. Copy .env.example to .env and set NC_ADMIN_PASSWORD.}
      TZ: ${TZ:?TZ is required. Copy .env.example to .env and set TZ.}
    volumes:
      - ./data/nocodb:/usr/app/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null 2>&1 || wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    networks:
      - backend

  bootstrap:
    build:
      context: .
      dockerfile: bootstrap/Dockerfile
    container_name: classroom-mis-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
      nocodb:
        condition: service_healthy
    environment:
      APP_SCHEMA: ${APP_SCHEMA:?APP_SCHEMA is required. Copy .env.example to .env and set APP_SCHEMA.}
      NC_ADMIN_EMAIL: ${NC_ADMIN_EMAIL:?NC_ADMIN_EMAIL is required. Copy .env.example to .env and set NC_ADMIN_EMAIL.}
      NC_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD:?NC_ADMIN_PASSWORD is required. Copy .env.example to .env and set NC_ADMIN_PASSWORD.}
      NOCODB_BASE_TITLE: ${NOCODB_BASE_TITLE:?NOCODB_BASE_TITLE is required. Copy .env.example to .env and set NOCODB_BASE_TITLE.}
      NOCODB_BASE_VERSION: ${NOCODB_BASE_VERSION:?NOCODB_BASE_VERSION is required. Copy .env.example to .env and set NOCODB_BASE_VERSION.}
      NOCODB_BOOTSTRAP_POLL_INTERVAL_SECONDS: ${NOCODB_BOOTSTRAP_POLL_INTERVAL_SECONDS:?NOCODB_BOOTSTRAP_POLL_INTERVAL_SECONDS is required. Copy .env.example to .env and set NOCODB_BOOTSTRAP_POLL_INTERVAL_SECONDS.}
      NOCODB_BOOTSTRAP_TIMEOUT_SECONDS: ${NOCODB_BOOTSTRAP_TIMEOUT_SECONDS:?NOCODB_BOOTSTRAP_TIMEOUT_SECONDS is required. Copy .env.example to .env and set NOCODB_BOOTSTRAP_TIMEOUT_SECONDS.}
      NOCODB_INTEGRATION_TITLE: ${NOCODB_INTEGRATION_TITLE:?NOCODB_INTEGRATION_TITLE is required. Copy .env.example to .env and set NOCODB_INTEGRATION_TITLE.}
      NOCODB_INTERNAL_URL: ${NOCODB_INTERNAL_URL:?NOCODB_INTERNAL_URL is required. Copy .env.example to .env and set NOCODB_INTERNAL_URL.}
      NOCODB_SOURCE_ALIAS: ${NOCODB_SOURCE_ALIAS:?NOCODB_SOURCE_ALIAS is required. Copy .env.example to .env and set NOCODB_SOURCE_ALIAS.}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required. Copy .env.example to .env and set POSTGRES_DB.}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required. Copy .env.example to .env and set POSTGRES_HOST.}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Copy .env.example to .env and set POSTGRES_PASSWORD.}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required. Copy .env.example to .env and set POSTGRES_PORT.}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required. Copy .env.example to .env and set POSTGRES_USER.}
      TZ: ${TZ:?TZ is required. Copy .env.example to .env and set TZ.}
    restart: "no"
    networks:
      - backend

networks:
  backend:
